<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pi Digits Calculator</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 95%;
  max-width: 520px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding: 18px;
  border-radius: 18px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

h1 {
  text-align: center;
  margin-bottom: 12px;
  font-size: 22px;
}

.inputs {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  background: rgba(255,255,255,0.08);
  color: white;
}

input::placeholder {
  color: rgba(255,255,255,0.5);
}

@media (max-width: 480px) {
  .inputs {
    flex-direction: column;
  }
}

.result {
  margin-top: 15px;
  background: black;
  padding: 14px;
  border-radius: 12px;
  font-family: monospace;
  max-height: 220px;
  overflow-y: auto;
  word-break: break-all;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
  font-size: 15px;
}

.highlight {
  background: yellow;
  color: black;
  border-radius: 4px;
  padding: 1px 2px;
}

.highlight.active {
  background: red;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: #3b82f6;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.25s ease;
}

.copy-btn {
  background: #10b981;
}

.copy-btn:active {
  transform: scale(0.96);
}

.copy-btn.copied {
  background: #2563eb;
  transform: scale(1.05);
}

.find-btn {
  width: auto;
  padding: 6px 10px;
  margin-top: 6px;
  background: #ef4444;
  font-size: 12px;
}

.info {
  margin-top: 10px;
  font-size: 13px;
  opacity: 0.85;
  display: flex;
  justify-content: space-between;
}

.status {
  margin-top: 6px;
  font-size: 12px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">
  <h1>π Digits Calculator</h1>

  <div class="inputs">
    <input id="start" type="number" placeholder="Start">
    <input id="end" type="number" placeholder="End">
  </div>

  <div class="inputs" style="margin-top:8px;">
    <input id="pattern" type="text" placeholder="Highlight pattern">
  </div>

  <button class="copy-btn" onclick="copyText()">Copy</button>
  <button class="find-btn" onclick="findNext()">Find Next</button>

  <div class="result" id="output">Type numbers to begin...</div>

  <div class="info">
    <div id="counter">Digits: 0</div>
    <div id="range">Range: -</div>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
const PI_URL = "pi.txt";
const worker = new Worker("worker.js");
let globalMatches = [];

let fullResult = "";
let visibleResult = "";
let debounceTimer;
let currentIndex = -1;
let matchElements = [];

const MAX_RENDER = 10000;

document.getElementById("start").addEventListener("input", triggerUpdate);
document.getElementById("end").addEventListener("input", triggerUpdate);
document.getElementById("pattern").addEventListener("input", applyHighlight);

function triggerUpdate() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(loadPi, 200);
}

async function loadPi() {
  const start = parseInt(document.getElementById("start").value);
  const end = parseInt(document.getElementById("end").value);

  if (isNaN(start) || isNaN(end) || start < 1 || end < start) {
    document.getElementById("output").innerText = "Enter valid range";
    return;
  }

  try {
    const byteStart = start + 1;
    const byteEnd = end + 1;

    document.getElementById("status").innerText = "Loading...";

    const response = await fetch(PI_URL, {
      headers: {
        "Range": `bytes=${byteStart}-${byteEnd}`
      }
    });

    const text = await response.text();

    if (start === 1) {
      fullResult = "3." + text;
    } else {
      fullResult = text;
    }

    updateInfo(start, end);

    document.getElementById("status").innerText = "Loaded";

    applyHighlight();

  } catch (e) {
    document.getElementById("status").innerText =
      "Error (Range may not be supported)";
  }
}

function applyHighlight() {
  const pattern = document.getElementById("pattern").value;
  const output = document.getElementById("output");

  currentIndex = -1;
  matchElements = [];

  if (!fullResult) return;

  // LIMIT RENDER SIZE
  if (fullResult.length > MAX_RENDER) {
    visibleResult =
      fullResult.slice(0, MAX_RENDER) +
      "\n\n...[Showing first " + MAX_RENDER.toLocaleString() + " digits]";
  } else {
    visibleResult = fullResult;
  }

  if (!pattern) {
    output.textContent = visibleResult;
    document.getElementById("status").innerText = "Loaded";
    return;
  }

  const escaped = pattern.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const regex = new RegExp(escaped, "g");

worker.postMessage({
  text: fullResult,
  pattern: pattern
});

document.getElementById("status").innerText = "Searching...";
  const count = matches ? matches.length : 0;

  const digitsTotal = fullResult.replace(".", "").length;
  const digitsCovered = count * pattern.length;

  const percent = digitsTotal > 0
    ? ((digitsCovered / digitsTotal) * 100).toFixed(3)
    : 0;

  const highlighted = visibleResult.replace(regex, match =>
    `<span class="highlight">${match}</span>`
  );

  output.innerHTML = highlighted;

  matchElements = document.querySelectorAll(".highlight");

  document.getElementById("status").innerText =
    `${count.toLocaleString()} match${count !== 1 ? "es" : ""} • ${digitsCovered.toLocaleString()} out of ${digitsTotal.toLocaleString()} (${percent}%)`;
}

function findNext() {
  const pattern = document.getElementById("pattern").value;
  if (!pattern || !fullResult) return;

  if (!globalMatches || globalMatches.length === 0) {
    document.getElementById("status").innerText = "No matches";
    return;
  }

  currentIndex = (currentIndex + 1) % globalMatches.length;

  const matchPos = globalMatches[currentIndex];

  const escaped = pattern.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const regex = new RegExp(escaped, "g");

  // 🔥 Center around match
  const start = Math.max(0, matchPos - 5000);
  const end = Math.min(fullResult.length, matchPos + 5000);

  visibleResult = fullResult.slice(start, end);

  // Highlight visible chunk
  const highlighted = visibleResult.replace(regex, m =>
    `<span class="highlight">${m}</span>`
  );

  const output = document.getElementById("output");
  output.innerHTML = highlighted;

  matchElements = document.querySelectorAll(".highlight");

  // 🔥 Activate correct match (important fix)
  if (matchElements.length > 0) {
    matchElements.forEach(el => el.classList.remove("active"));

    // Find the correct one inside the chunk
    let closest = 0;
    for (let i = 0; i < matchElements.length; i++) {
      const pos = visibleResult.indexOf(matchElements[i].textContent);
      if (pos >= (matchPos - start)) {
        closest = i;
        break;
      }
    }

    const active = matchElements[closest];
    active.classList.add("active");

    setTimeout(() => {
      active.scrollIntoView({ behavior: "smooth", block: "center" });
    }, 50);
  }

  // Optional: show match index
  document.getElementById("status").innerText =
    `Match ${(currentIndex + 1).toLocaleString()} / ${globalMatches.length.toLocaleString()}`;
}

  const output = document.getElementById("output");
  output.innerHTML = highlighted;

  matchElements = document.querySelectorAll(".highlight");

  // Scroll to the correct match in this chunk
  if (matchElements.length > 0) {
    matchElements.forEach(el => el.classList.remove("active"));

    const active = matchElements[0];
    active.classList.add("active");

    setTimeout(() => {
      active.scrollIntoView({ behavior: "smooth", block: "center" });
    }, 50);
  }
}

function updateInfo(start, end) {
  const digits = end - start + 1;

  document.getElementById("counter").innerText =
    `Digits: ${digits.toLocaleString()}`;

  document.getElementById("range").innerText =
    `Range: ${start.toLocaleString()}–${end.toLocaleString()}`;
}

function copyText() {
  if (!fullResult) return;

  const btn = document.querySelector(".copy-btn");

  navigator.clipboard.writeText(fullResult).then(() => {
    btn.classList.add("copied");
    const originalText = btn.innerText;
    btn.innerText = "Copied!";

    document.getElementById("status").innerText = "Copied!";

    setTimeout(() => {
      btn.classList.remove("copied");
      btn.innerText = originalText;
    }, 900);
  });
}

worker.onmessage = function(e) {
  globalMatches = e.data.matches;

  const count = globalMatches.length;

  const digitsTotal = fullResult.replace(".", "").length;
  const digitsCovered = count * document.getElementById("pattern").value.length;

  const percent = digitsTotal > 0
    ? ((digitsCovered / digitsTotal) * 100).toFixed(3)
    : 0;

  document.getElementById("status").innerText =
    `${count.toLocaleString()} match${count !== 1 ? "es" : ""} • ${digitsCovered.toLocaleString()} out of ${digitsTotal.toLocaleString()} (${percent}%)`;
};

</script>

</body>
</html>
