<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pi Digits Calculator</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 95%;
  max-width: 520px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding: 18px;
  border-radius: 18px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

h1 {
  text-align: center;
  margin-bottom: 12px;
  font-size: 22px;
}

.inputs {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  background: rgba(255,255,255,0.08);
  color: white;
}

input::placeholder {
  color: rgba(255,255,255,0.5);
}

@media (max-width: 480px) {
  .inputs {
    flex-direction: column;
  }
}

.result {
  margin-top: 15px;
  background: black;
  padding: 14px;
  border-radius: 12px;
  font-family: monospace;
  max-height: 220px;
  overflow-y: auto;
  word-break: break-all;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
  font-size: 15px;
}

.highlight {
  background: yellow;
  color: black;
  border-radius: 4px;
  padding: 1px 2px;
}

.highlight.active {
  background: red;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: #3b82f6;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.25s ease;
}

.copy-btn {
  background: #10b981;
}

.copy-btn:active {
  transform: scale(0.96);
}

.copy-btn.copied {
  background: #2563eb;
  transform: scale(1.05);
}

.find-btn {
  width: auto;
  padding: 6px 10px;
  margin-top: 6px;
  background: #ef4444;
  font-size: 12px;
}

.info {
  margin-top: 10px;
  font-size: 13px;
  opacity: 0.85;
  display: flex;
  justify-content: space-between;
}

.status {
  margin-top: 6px;
  font-size: 12px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">
  <h1>π Digits Calculator</h1>

  <div class="inputs">
    <input id="start" type="number" placeholder="Start">
    <input id="end" type="number" placeholder="End">
  </div>

  <div class="inputs" style="margin-top:8px;">
    <input id="pattern" type="text" placeholder="Highlight pattern">
  </div>

  <button class="copy-btn" onclick="copyText()">Copy</button>
  <button class="find-btn" onclick="findNext()">Find Next</button>

  <div class="result" id="output">Type numbers to begin...</div>

  <div class="info">
    <div id="counter">Digits: 0</div>
    <div id="range">Range: -</div>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
const PI_URL = "pi.txt";

let lastResult = "";
let debounceTimer;
let currentIndex = -1;
let matchElements = [];

document.getElementById("start").addEventListener("input", triggerUpdate);
document.getElementById("end").addEventListener("input", triggerUpdate);
document.getElementById("pattern").addEventListener("input", applyHighlight);

function triggerUpdate() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(loadPi, 200);
}

async function loadPi() {
  const start = parseInt(document.getElementById("start").value);
  const end = parseInt(document.getElementById("end").value);

  if (isNaN(start) || isNaN(end) || start < 1 || end < start) {
    document.getElementById("output").innerText = "Enter valid range";
    return;
  }

  try {
    const byteStart = start + 1;
    const byteEnd = end + 1;

    document.getElementById("status").innerText = "Loading...";

    const response = await fetch(PI_URL, {
      headers: {
        "Range": `bytes=${byteStart}-${byteEnd}`
      }
    });

    const text = await response.text();

    let result;

    if (start === 1) {
      result = "3." + text;
    } else {
      result = text;
    }

    lastResult = result;

    updateInfo(start, end);
    document.getElementById("status").innerText = "Loaded";

    applyHighlight();

  } catch (e) {
    document.getElementById("status").innerText =
      "Error (Range may not be supported)";
  }
}

function applyHighlight() {
  const pattern = document.getElementById("pattern").value;
  const output = document.getElementById("output");

  currentIndex = -1;
  matchElements = [];

  if (!pattern) {
    output.innerText = lastResult;
    document.getElementById("status").innerText = "Loaded";
    return;
  }

  const escaped = pattern.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const regex = new RegExp(escaped, "g");

  const matches = lastResult.match(regex);
  const count = matches ? matches.length : 0;

  const digitsTotal = lastResult.replace(".", "").length;
  const digitsCovered = count * pattern.length;

  const percent = digitsTotal > 0
    ? ((digitsCovered / digitsTotal) * 100).toFixed(3)
    : 0;

  const highlighted = lastResult.replace(regex, match =>
    `<span class="highlight">${match}</span>`
  );

  output.innerHTML = highlighted;

  matchElements = document.querySelectorAll(".highlight");

  document.getElementById("status").innerText =
    `${count.toLocaleString()} match${count !== 1 ? "es" : ""} • ${digitsCovered.toLocaleString()} out of ${digitsTotal.toLocaleString()} (${percent}%)`;
}

function findNext() {
  if (matchElements.length === 0) return;

  if (currentIndex >= 0) {
    matchElements[currentIndex].classList.remove("active");
  }

  currentIndex = (currentIndex + 1) % matchElements.length;

  const el = matchElements[currentIndex];
  el.classList.add("active");
  el.scrollIntoView({ behavior: "smooth", block: "center" });
}

function updateInfo(start, end) {
  const digits = end - start + 1;

  document.getElementById("counter").innerText =
    `Digits: ${digits.toLocaleString()}`;

  document.getElementById("range").innerText =
    `Range: ${start.toLocaleString()}–${end.toLocaleString()}`;
}

function copyText() {
  if (!lastResult) return;

  const btn = document.querySelector(".copy-btn");

  navigator.clipboard.writeText(lastResult).then(() => {
    btn.classList.add("copied");
    const originalText = btn.innerText;
    btn.innerText = "Copied!";

    document.getElementById("status").innerText = "Copied!";

    setTimeout(() => {
      btn.classList.remove("copied");
      btn.innerText = originalText;
    }, 900);
  });
}
</script>

</body>
</html>
