<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pi Digits Calculator</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 95%;
  max-width: 520px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding: 18px;
  border-radius: 18px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

h1 {
  text-align: center;
  margin-bottom: 12px;
  font-size: 22px;
}

.inputs {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  background: rgba(255,255,255,0.08);
  color: white;
}

input::placeholder {
  color: rgba(255,255,255,0.5);
}

@media (max-width: 480px) {
  .inputs {
    flex-direction: column;
  }
}

.result {
  margin-top: 15px;
  background: black;
  padding: 14px;
  border-radius: 12px;
  font-family: monospace;
  max-height: 220px;
  overflow-y: auto;
  word-break: break-all;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
  font-size: 15px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: #3b82f6;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.25s ease;
}

.copy-btn {
  background: #10b981;
  position: relative;
  overflow: hidden;
}

.copy-btn:active {
  transform: scale(0.96);
}

.copy-btn.copied {
  background: #2563eb;
  transform: scale(1.05);
}

.info {
  margin-top: 10px;
  font-size: 13px;
  opacity: 0.85;
  display: flex;
  justify-content: space-between;
}

.status {
  margin-top: 6px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">
  <h1>π Digits Calculator</h1>

  <div class="inputs">
    <input id="start" type="number" placeholder="Start">
    <input id="end" type="number" placeholder="End">
  </div>

  <button class="copy-btn" onclick="copyText()">Copy</button>

  <div class="result" id="output">Type numbers to begin...</div>

  <div class="info">
    <div id="counter">Digits: 0</div>
    <div id="range">Range: -</div>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
const PI_URL = "https://gist.githubusercontent.com/stupid-genius/51f6bbb021dbce46cdef9b1f08eb3561/raw/8b5dc98fa123966778f78677ad56be7236b6e863/pidigits";

let lastResult = "";
let debounceTimer;

document.getElementById("start").addEventListener("input", triggerUpdate);
document.getElementById("end").addEventListener("input", triggerUpdate);

function triggerUpdate() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(loadPi, 200);
}

async function loadPi() {
  const start = parseInt(document.getElementById("start").value);
  const end = parseInt(document.getElementById("end").value);

  if (isNaN(start) || isNaN(end) || start < 1 || end < start) {
    document.getElementById("output").innerText = "Enter valid range";
    return;
  }

  try {
    const byteStart = start + 1;
    const byteEnd = end + 1;

    document.getElementById("status").innerText = "Loading...";

    const response = await fetch(PI_URL, {
      headers: {
        "Range": `bytes=${byteStart}-${byteEnd}`
      }
    });

    const text = await response.text();

    let result;

    if (start === 1) {
      result = "3." + text;
    } else {
      result = text;
    }

    lastResult = result;
    document.getElementById("output").innerText = result;

    updateInfo(start, end);

    document.getElementById("status").innerText = "Loaded";

  } catch (e) {
    document.getElementById("status").innerText =
      "Error (Range may not be supported)";
  }
}

function updateInfo(start, end) {
  const digits = end - start + 1;

  document.getElementById("counter").innerText =
    `Digits: ${digits.toLocaleString()}`;

  document.getElementById("range").innerText =
    `Range: ${start.toLocaleString()}–${end.toLocaleString()}`;
}

function copyText() {
  if (!lastResult) return;

  const btn = document.querySelector(".copy-btn");

  navigator.clipboard.writeText(lastResult).then(() => {
    btn.classList.add("copied");

    const originalText = btn.innerText;
    btn.innerText = "Copied!";

    document.getElementById("status").innerText = "Copied!";

    setTimeout(() => {
      btn.classList.remove("copied");
      btn.innerText = originalText;
    }, 900);
  });
}
</script>

</body>
</html>
